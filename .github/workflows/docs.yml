name: docs
on:
   push:
      branches:
         - master
      paths:
         - 'docs/**'
         - 'scrimage-filters/src/test/kotlin/com/sksamuel/scrimage/ExampleGenerator.kt'

jobs:
   deploy:
      runs-on: ubuntu-latest
      steps:
         -  uses: actions/checkout@v7
         -  uses: actions/setup-python@v6
            with:
               python-version: 3.x
         -  run: pip install mkdocs-material
         -  run: mkdocs gh-deploy --force
